front:
  text: 洞真太上上清內經內七上清髙真元始天王時與五老上帝九天真王十方大聖衆無極至真諸君丈人同於赤明世界柏陵舍中坐香園之中長桑之下天王回駕諸天降席是時雲霧鬱勃四景冥合九日九夜玄隂不解天地無光有如龍漢之前幽幽冥冥五老上真前進作禮上白天尊今日侍座所未嘗經天尊出遊諸天傾駕上帝髙真神仙玉女日月星宿璇璣玉衡三界官屬五嶽山神河海水帝一切神靈莫不振肅侍衛天真當時天朗氣清風不搖條地無飛塵河海靜默山嶽藏煙時和氣定使生死同歡而閉天光明白日晝隂天人惶怖四座不寧不審何故所緣如是願垂告誨令衆見明饒益一切普得安全天王上真元始天尊告曰今日同座歡樂難遇天發瑞應自然玉字金書煥爛障蔽天光未通之始致如晝冥日慶時合希所嘗有今當為四衆開天妙真九天正名真諱以度上真之人應得道之身咸令一心念真閉目伏地於是大聖髙仙十方衆真大衆旡鞅數衆不可勝計同時伏地聽命俄頃之間天氣朗除冥暗豁消五色光明洞徹十方忽有天書自然空生字方一丈自然而見虛空之上空玄之內五色光中文彩煥爛八角垂芒精光亂眼不可得看元始天尊普告四座十方無極大衆此是靈書九天真諱合和之氣空生自然九天所説杳奧難可尋詳吾昔付真人口訣祕於洞房金華之宫今以告子克得上真與道合體非朝則夕明慎閉口修而行之元始告太上大道君曰妙道宜明便可注筆解其正音使皇道既暢澤被十方周歷八極六合之內六合之外脫有靈瑞應運宿植重緑有合真之人宜以告乎上仙上白天尊元始天王曰輒當因流揚波乘風鼓旗自隨運轉輪億劫以來屢經侍座教導一切初未如今日遭值聖道開諸法門得見天書自然至真骨相應圖合五和之音非愚情短思所能洞明今既厠座仰欣觀玄不敢藏情輒當乘範周歷八極六合內外按所見書傳冀萬有一合稽首奉命而作頌曰元始開大有落落諸天明妙哉龍漢道八會結成經煥爛飛空內流光三界庭神真啓靈會玉字應景生天真通妙趣五和合成章朗朗玉音響飄飄萃上清開度無終始九幽受光明巍巍大法門教導一切生斯功不可勝歡樂慶萬齡上清九天真名大符佩身升仙飛行上法髙上空玄元始丈人自然精光玉寶符第一真名混法度應得道之人髙上九玄元始天王虛生結精通光玉符第二真名洞法度應得道之人髙上太空九天丈人玄生玉精凝靈保真符第三真名開法度應得道之人髙上玄虛九天真王空生自然清流保仙符第四真名明法度應得道之人髙上空洞混化九天道父精生天通氣符第五真名道法度應得道之人髙上空生虛無自然九天真母九微道黃精符第六真名沌法度應得道之人髙上玉寶太真丈人三氣紫靈符第七真名闥法度應得道之人髙上紫映九霄太真飛靈自生神符第八真名喘法度應得道之人髙上玉虛萬始先生玄靈紫霞升幽符第九真名浪蘭法度應得道之人右九天真名金訣真符法度上仙不度中仙得深寶祕藏之金匱勿妄示人有風刀之考鬱單旡量天八生自然寶符姓諱杓物羅真訣禪善無量夀天玉真虛生混成靈符姓諱墮杓勒真訣梵監天三氣龍胎玉靈神水生自然符姓諱提頭羅真訣兜術天道真空九微鳴水素元之符姓諱擕任度真訣不驕樂天九虛玄生天水飛靈元精符姓諱須持真訣化應聲天玉寶洞微左契命保真符姓諱蘇越真訣鬱寶天虛明左契神化通神五符姓諱務雲梓真訣梵摩迦夷天空玄上元三氣化自然符姓諱凝泓真訣波梨答惒天九氣生身三景清微飛空符姓諱靈淵真訣右髙上九天真王真姓真諱法應度得道之人不度中仙閉口奉修藏之洞房金華宫中勿妄示人泄露祕諱身沒九泉明慎奉行東方青帝玉司上元玄靈自然道度仙符姓諱區更生真訣南方赤帝玉司玄天靈元皇微王真符姓諱祝昌中真訣西方白帝玉司中元皇靈几化生八氣紫仙金符姓諱辱曲正真訣北方黑帝玉司皇元靈都虛微八道金真玉符姓諱玄尹豐真訣中央黃帝玉司三元靈微正黃書真生之符姓諱王真真訣右九天五方玉司姓名祕於九天之上結十方真氣合和五方自然之氣結而凝精成真姓名以為佩帶於三十二天之中科簡脫有合仙之人骨相應圖依立玄都具格盟天金繒誓心奉經之心至然後而告若得身佩九天真王自然真名姓諱之人必得上仙不旬月翔但精心信向勿不精勤深藏金華洞房之宫閉口奉修勿以輒傳泄露真名考沒爾身上學之士詳慎奉行
