body:
  text: 太上黃中理氣九微玄城精溉太和主旡逝九天長笇靈侍愛中元上真來監交上元赤子總近生下元丈人使千靈玄上飛真主養生髙上元君益天精紫微朱宫稱太平猛獸四衛爾形軀我九口長牙天𡉂四目首吞虎平河食金柱八風吹海張炎叩禮山焦禽剝鑿齒御蛇玃天嶺萬父八文蛇年喻辰斗栴丘走萬牙斧斧猛目啖石銜豹舞師子金頭食鬼茍張山柏地雷鳴獸電天牛破山賤踊百靈行飛走附強禽在我備爾神長益氣命付魂行海及丘山使天獸促爾身太上真丈人保長生得神仙登九微玄右上清紫素元君上真撰出真文以為回文髙上元君以此真文度三十二天中紫微上宫宿有玄名帝簡者應輔上仙之人不傳中仙地仙不得參聞自旡萬劫植福福流今身終不得見若有得者尅獲上仙骨肉俱飛此真訣要傳上清紫臺玄闕宿有金名玉簡者受文而不學要自成仙一名太真隂陽靈籙一名九流真書此真訣旡所不辟旡所不除學上仙之道要須受佩勿妄示人有風刀之栲一依四極明科之制洞真太上上清內經
  hash: sha256:8cfe734b4174c7a73f61821cdfba56b96ac58f7e95d1dcc9eacaa7feb4a779a1
